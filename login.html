<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
     <!-- Font Integration -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">
    <!-- Tailwind & dausy UI -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <link rel="stylesheet" href="login.css">
</head>
<body class="min-h-screen max-w-md mx-auto bg-[#F8FAFC]">
    <div class="space-y-5">
        <div class="logo w-[250px] mx-auto pt-32 mb-10 flex justify-center">
        <img src="./assets/github-logo.png" alt="">        
        </div>
        <div class="flex flex-col justify-center items-center">
        <h3 class="text-3xl font-bold text-[#1F2937]">GitHub Issues Tracker</h3>
        <p class="text-xl text-[#64748B]">Sign in to manage your issues</p>
        </div>
    </div>
    <div class="form pt-10">
        <div class="card bg-base-100 w-full max-w-sm shrink-0 shadow mx-auto rounded-2xl">
      <div class="card-body">
        <fieldset class="fieldset">
          <label class="label text-xl font-bold text-[#1F2937]">User Name</label>
          <input id="input-username" maxlength="11" minlength="4" type="text" class="input text-lg text-[#64748B] rounded-xl bg-base-200" placeholder="Enter User Name" />
          <br>
          <label class="label text-xl font-bold text-[#1F2937]">Password</label>
          <input id="input-password" type="password" maxlength="8" class="input text-lg rounded-xl bg-base-200" placeholder="Enter Password" />
          <div></div>
          <button id="btn-login" class="btn btn-primary text-xl mt-4 rounded-xl">Sign In</button>
        </fieldset>
      </div>
    </div>
    </div>

    <script src="./login/login.js"></script>
</body>
</html>
